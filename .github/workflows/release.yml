name: Build zellij for Debian

on:
  workflow_dispatch:
    inputs:
      zellij_version:
        description: The version of zellij to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true
      architecture:
        description: Architecture to build (amd64, arm64, or 'all' for all architectures)
        type: choice
        default: 'all'
        options:
          - 'all'
          - 'amd64'
          - 'arm64'

permissions:
  contents: write

jobs:
  build-zellij:
    name: Build Binary Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zellij-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.zellij_version }}

      - name: Build zellij
        run: ./build_debian.sh ${{ inputs.zellij_version }} ${{ inputs.build_version }} ${{ inputs.architecture }} && ./build_ubuntu.sh ${{ inputs.zellij_version }} ${{ inputs.build_version }} ${{ inputs.architecture }}

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-artifact
          path: zellij_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zellij-debian
        uses: actions/checkout@v4

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.zellij_version }} ${{ inputs.build_version }}

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            zellij_*.dsc
            zellij_*.orig.tar.gz
            zellij_*.debian.tar.xz

  release-zellij:
    name: Release zellij for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-zellij, build-src]
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binary-artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            zellij_*.deb
            zellij_*.dsc
            zellij_*.orig.tar.gz
            zellij_*.debian.tar.xz
          name: ${{ inputs.zellij_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.zellij_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
